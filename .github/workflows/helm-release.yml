name: Helm Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "memory-infra/helm/**"
      - ".github/workflows/helm-release.yml"

jobs:
  lint:
    name: Lint & Template
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: helm lint memory-infra/helm/aether-memory

      - name: Helm template (render sanity check)
        run: helm template release-test memory-infra/helm/aether-memory > /dev/null

  package-push:
    name: Package & Push (OCI)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package memory-infra/helm/aether-memory --destination dist

      - name: Push chart to GHCR
        run: helm push dist/aether-memory-*.tgz oci://ghcr.io/suplab/charts
