apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-memory
  namespace: aether-memory
  labels:
    app: aether-memory
    app.kubernetes.io/name: aether-memory
    app.kubernetes.io/part-of: aether
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aether-memory
  template:
    metadata:
      labels:
        app: aether-memory
        app.kubernetes.io/name: aether-memory
    spec:
      serviceAccountName: aether-memory
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: aether-memory
          image: ghcr.io/suplab/aether-memory:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: aether-memory-secrets
                  key: postgres-url
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: aether-memory-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aether-memory-secrets
                  key: postgres-password
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aether-memory-config
                  key: ollama-base-url
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
